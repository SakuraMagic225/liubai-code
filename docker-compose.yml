services:
  mysql:
    image: mysql:8.4
    container_name: liubai-code-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - liubai_network

  backend:
    build:
      context: .
      dockerfile: deploy/backend/Dockerfile
    container_name: liubai-code-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-168}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      TZ: Asia/Shanghai
    volumes:
      - uploads_data:/app/uploads
    networks:
      - liubai_network

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    container_name: liubai-code-nginx
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/certs:/etc/nginx/certs:ro
      - uploads_data:/uploads:ro
    networks:
      - liubai_network

volumes:
  mysql_data:
  uploads_data:

networks:
  liubai_network:
    driver: bridge
