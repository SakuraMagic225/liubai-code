server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: liubai-code
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:liubaicode}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  swagger-ui:
    path: /swagger-ui.html

liubai:
  upload:
    dir: ${UPLOAD_DIR:uploads}
  auth:
    jwt-secret: ${JWT_SECRET:liubai-code-local-dev-secret-change-me}
    jwt-expire-hours: ${JWT_EXPIRE_HOURS:168}
